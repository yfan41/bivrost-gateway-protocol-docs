name: Deploy docs

# Builds the Starlight site and rsyncs it over SSH to the web server so it is
# served at https://docs.bivrost.cn/gateway-protocol/ (base set via DOCS_BASE below).

on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy at a time; let an in-flight deploy finish rather than cancel it
# (a half-synced docs tree is worse than a slightly stale one).
concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        # Standalone web build served from https://docs.bivrost.cn/gateway-protocol/.
        # DOCS_BASE sets Astro's base so all URLs are prefixed with /gateway-protocol.
        # pnpm build runs starlight-links-validator; a broken link fails the build
        # (and the deploy) before anything is uploaded.
        env:
          DOCS_BASE: /gateway-protocol
        run: pnpm build

      - name: Deploy over SSH (rsync)
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          # Absolute path of the protocol docs' web root, a subdir dedicated to this
          # site. rsync --delete only wipes within this subdir, not the sibling
          # gateway/ site under the shared /var/www/docs.bivrost.cn root.
          DEPLOY_PATH: /var/www/docs.bivrost.cn/gateway-protocol
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          PORT="${SSH_PORT:-22}"
          # Pin the host key at runtime (trust-on-first-use) so StrictHostKeyChecking
          # can stay on without maintaining a SSH_KNOWN_HOSTS secret.
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" > "$HOME/.ssh/known_hosts" 2>/dev/null
          chmod 644 "$HOME/.ssh/known_hosts"
          rsync -avz --delete \
            -e "ssh -i $HOME/.ssh/deploy_key -p ${PORT} -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=yes" \
            dist/ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"
