name: Deploy docs

# Builds the Starlight site and rsyncs it over SSH to the web server so it is
# served at https://docs.bivrost.cn/gateway-protocol/ (base set via DOCS_BASE below).

on:
  push:
    branches: [main]
  workflow_dispatch:

# One deploy at a time; let an in-flight deploy finish rather than cancel it
# (a half-synced docs tree is worse than a slightly stale one).
concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build & deploy over SSH (rsync)
        # Publishes the protocol docs twice: the latest tree served in place at
        # /gateway-protocol/, and a frozen snapshot at /gateway-protocol/v<version>/.
        # DOCS_BASE (read by astro.config.mjs) rebases each build's URLs; VERSION at
        # the repo root is the single source of the version. pnpm build runs
        # starlight-links-validator; a broken link fails the build (and the deploy)
        # before anything is uploaded.
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          # Absolute path of the protocol docs' web root, a subdir dedicated to this
          # site. rsync --delete only wipes within this subdir, not the sibling
          # gateway/ site under the shared /var/www/docs.bivrost.cn root.
          DEPLOY_PATH: /var/www/docs.bivrost.cn/gateway-protocol
        run: |
          set -euo pipefail
          VER="$(cat VERSION)"
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$SSH_KEY" > "$HOME/.ssh/deploy_key"
          chmod 600 "$HOME/.ssh/deploy_key"
          PORT="${SSH_PORT:-22}"
          # Pin the host key at runtime (trust-on-first-use) so StrictHostKeyChecking
          # can stay on without maintaining a SSH_KNOWN_HOSTS secret.
          ssh-keyscan -p "$PORT" -H "$SSH_HOST" > "$HOME/.ssh/known_hosts" 2>/dev/null
          chmod 644 "$HOME/.ssh/known_hosts"
          SSH="ssh -i $HOME/.ssh/deploy_key -p ${PORT} -o UserKnownHostsFile=$HOME/.ssh/known_hosts -o StrictHostKeyChecking=yes"

          # 1) Latest — served in place at /gateway-protocol/. --exclude keeps
          #    --delete from wiping the sibling v<version>/ snapshot dirs (no content
          #    dir starts with /v<digit>).
          DOCS_BASE=/gateway-protocol pnpm build
          rsync -avz --delete --exclude '/v[0-9]*/' \
            -e "$SSH" dist/ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/"

          # 2) Frozen snapshot at /gateway-protocol/v<version>/ (isolated subdir, plain --delete).
          DOCS_BASE="/gateway-protocol/v${VER}" pnpm build
          $SSH "${SSH_USER}@${SSH_HOST}" "mkdir -p '${DEPLOY_PATH}/v${VER}'"
          rsync -avz --delete \
            -e "$SSH" dist/ "${SSH_USER}@${SSH_HOST}:${DEPLOY_PATH}/v${VER}/"
